server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    charset utf-8;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # HTML — no caching so updates appear immediately after each deploy.
    location ~* \.html?$ {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Generic fallback (sub-directories with their own index.html, e.g. "V. 0.20/IT/").
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Media is offloaded to S3+CloudFront and is excluded from this image
    # (.dockerignore drops build/_shared/, build/_assets/, build/Offline manual.zip).
    # If a request for these paths reaches nginx, the URL rewrite in CI did not run —
    # return a real 404 instead of letting the SPA fallback serve HTML.
    location /_shared/ { return 404; }
    location /_assets/ { return 404; }
    location = /Offline%20manual.zip { return 404; }
    location = "/Offline manual.zip" { return 404; }
}
