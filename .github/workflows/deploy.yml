name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'build/**'
      - 'Dockerfile'
      - 'nginx.conf'
      - '.dockerignore'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
  CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}
  DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  sync-s3:
    name: Rewrite HTML & sync media to S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rewrite HTML asset URLs to CDN
        run: |
          set -euo pipefail
          if [ -z "${CDN_BASE_URL:-}" ]; then
            echo "::error::CDN_BASE_URL secret is empty" >&2
            exit 1
          fi
          # Strip any trailing slash and escape sed metacharacters in the URL.
          base="${CDN_BASE_URL%/}"
          escaped=$(printf '%s' "$base" | sed -e 's/[\/&]/\\&/g')
          find build -type f -name "*.html" -print0 | xargs -0 -r sed -E -i \
            -e 's#(src|href)="(\.{1,2}/)*(_shared/[^"]*)"#\1="'"${escaped}"'/\3"#g' \
            -e 's#(src|href)="(\.{1,2}/)*(_assets/[^"]*)"#\1="'"${escaped}"'/\3"#g' \
            -e 's#(src|href)="(\.{1,2}/)*Offline(%20| )manual\.zip"#\1="'"${escaped}"'/Offline%20manual.zip"#g'

      - name: Sync build/_shared/ to S3
        run: aws s3 sync build/_shared "s3://${S3_BUCKET}/_shared" --size-only --delete

      - name: Sync build/_assets/ to S3
        run: aws s3 sync build/_assets "s3://${S3_BUCKET}/_assets" --size-only --delete

      - name: Upload Offline manual.zip
        run: |
          if [ -f "build/Offline manual.zip" ]; then
            aws s3 cp "build/Offline manual.zip" "s3://${S3_BUCKET}/Offline manual.zip"
          else
            echo "build/Offline manual.zip not present — skipping"
          fi

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"

  build-image:
    name: Build & push Docker image, trigger Dokploy
    needs: sync-s3
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Rewrite HTML asset URLs to CDN
        run: |
          set -euo pipefail
          if [ -z "${CDN_BASE_URL:-}" ]; then
            echo "::error::CDN_BASE_URL secret is empty" >&2
            exit 1
          fi
          base="${CDN_BASE_URL%/}"
          escaped=$(printf '%s' "$base" | sed -e 's/[\/&]/\\&/g')
          find build -type f -name "*.html" -print0 | xargs -0 -r sed -E -i \
            -e 's#(src|href)="(\.{1,2}/)*(_shared/[^"]*)"#\1="'"${escaped}"'/\3"#g' \
            -e 's#(src|href)="(\.{1,2}/)*(_assets/[^"]*)"#\1="'"${escaped}"'/\3"#g' \
            -e 's#(src|href)="(\.{1,2}/)*Offline(%20| )manual\.zip"#\1="'"${escaped}"'/Offline%20manual.zip"#g'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: meta
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          owner_lc=$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')
          printf 'image=ghcr.io/%s/flexivision-docs\n' "$owner_lc" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

      - name: Trigger Dokploy redeploy
        env:
          DOKPLOY_WEBHOOK: ${{ secrets.DOKPLOY_WEBHOOK }}
        run: |
          if [ -z "${DOKPLOY_WEBHOOK:-}" ]; then
            echo "::warning::DOKPLOY_WEBHOOK secret is empty — skipping redeploy ping"
            exit 0
          fi
          curl -fsSL -X POST "$DOKPLOY_WEBHOOK"
